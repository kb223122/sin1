# Documentation: https://ugr-sail.github.io/sinergym/compilation/main/pages/environments_registration.html
# ---------------------------------------------------------------------------- #
#                        ID BASE FROM ENVIRONMNET NAMES                        #
# ---------------------------------------------------------------------------- #
id_base: 5zone_individual

# ---------------------------------------------------------------------------- #
#                         BUILDING AND WEATHER SETTINGS                        #
# ---------------------------------------------------------------------------- #
building_file: 5ZoneAutoDXVAV_5zone_individual_fixed.epJSON

# A environment alternative for each weather key
weather_specification:
  weather_files:
    - USA_AZ_Davis-Monthan.AFB.722745_TMY3.epw
    - USA_NY_New.York-J.F.Kennedy.Intl.AP.744860_TMY3.epw
    - USA_WA_Port.Angeles-William.R.Fairchild.Intl.AP.727885_TMY3.epw
  keys:
    - hot
    - mixed
    - cool

# ---------------------------------------------------------------------------- #
#                         BUILDING EXTRA CONFIGURATION                         #
# ---------------------------------------------------------------------------- #
building_config: null

# ---------------------------------------------------------------------------- #
#                        WEATHER VARIABILITY (OPTIONAL)                        #
# ---------------------------------------------------------------------------- #
# Alternative stochastic environments if it is defined
weather_variability:
  Dry Bulb Temperature:
    - 1.0 # sigma
    - 0.0 # mu
    - 24.0 # tau
  Relative Humidity:
    - [2.0, 5.0]
    - 0.0
    - 24.0
    - [0, 100] # var_range

# ---------------------------------------------------------------------------- #
#                          EPISODES FOLDER GENERATION                          #
# ---------------------------------------------------------------------------- #
max_ep_store: 3

# ---------------------------------------------------------------------------- #
#                             OBSERVATION VARIABLES                            #
# ---------------------------------------------------------------------------- #

# --------------- TIME VARIABLES (same name as EnergyPlus API) --------------- #
time_variables:
  - month
  - day_of_month
  - hour

# ----------------------------- OUTPUT:VARIABLES ----------------------------- #
variables:

  # ---------------------------------- OUTDOOR --------------------------------- #
  Site Outdoor Air DryBulb Temperature:
    variable_names: outdoor_temperature
    keys: Environment
  Site Outdoor Air Relative Humidity:
    variable_names: outdoor_humidity
    keys: Environment
  Site Wind Speed:
    variable_names: wind_speed
    keys: Environment
  Site Wind Direction:
    variable_names: wind_direction
    keys: Environment
  Site Diffuse Solar Radiation Rate per Area:
    variable_names: diffuse_solar_radiation
    keys: Environment
  Site Direct Solar Radiation Rate per Area:
    variable_names: direct_solar_radiation
    keys: Environment

  # -------------------------------- ZONE INDOOR ------------------------------- #
  # Each zone needs a UNIQUE variable name as the YAML key
  # Zone 1
  Zone Air Temperature Zone1:
    variable_names: space1-1_air_temperature
    keys: SPACE1-1
  Zone Air Relative Humidity Zone1:
    variable_names: space1-1_air_humidity
    keys: SPACE1-1
  Zone People Occupant Count Zone1:
    variable_names: space1-1_people_occupant
    keys: SPACE1-1
  Zone Thermostat Heating Setpoint Temperature Zone1:
    variable_names: space1-1_htg_setpoint
    keys: SPACE1-1
  Zone Thermostat Cooling Setpoint Temperature Zone1:
    variable_names: space1-1_clg_setpoint
    keys: SPACE1-1

  # Zone 2
  Zone Air Temperature Zone2:
    variable_names: space2-1_air_temperature
    keys: SPACE2-1
  Zone Air Relative Humidity Zone2:
    variable_names: space2-1_air_humidity
    keys: SPACE2-1
  Zone People Occupant Count Zone2:
    variable_names: space2-1_people_occupant
    keys: SPACE2-1
  Zone Thermostat Heating Setpoint Temperature Zone2:
    variable_names: space2-1_htg_setpoint
    keys: SPACE2-1
  Zone Thermostat Cooling Setpoint Temperature Zone2:
    variable_names: space2-1_clg_setpoint
    keys: SPACE2-1

  # Zone 3
  Zone Air Temperature Zone3:
    variable_names: space3-1_air_temperature
    keys: SPACE3-1
  Zone Air Relative Humidity Zone3:
    variable_names: space3-1_air_humidity
    keys: SPACE3-1
  Zone People Occupant Count Zone3:
    variable_names: space3-1_people_occupant
    keys: SPACE3-1
  Zone Thermostat Heating Setpoint Temperature Zone3:
    variable_names: space3-1_htg_setpoint
    keys: SPACE3-1
  Zone Thermostat Cooling Setpoint Temperature Zone3:
    variable_names: space3-1_clg_setpoint
    keys: SPACE3-1

  # Zone 4
  Zone Air Temperature Zone4:
    variable_names: space4-1_air_temperature
    keys: SPACE4-1
  Zone Air Relative Humidity Zone4:
    variable_names: space4-1_air_humidity
    keys: SPACE4-1
  Zone People Occupant Count Zone4:
    variable_names: space4-1_people_occupant
    keys: SPACE4-1
  Zone Thermostat Heating Setpoint Temperature Zone4:
    variable_names: space4-1_htg_setpoint
    keys: SPACE4-1
  Zone Thermostat Cooling Setpoint Temperature Zone4:
    variable_names: space4-1_clg_setpoint
    keys: SPACE4-1

  # Zone 5
  Zone Air Temperature Zone5:
    variable_names: space5-1_air_temperature
    keys: SPACE5-1
  Zone Air Relative Humidity Zone5:
    variable_names: space5-1_air_humidity
    keys: SPACE5-1
  Zone People Occupant Count Zone5:
    variable_names: space5-1_people_occupant
    keys: SPACE5-1
  Zone Thermostat Heating Setpoint Temperature Zone5:
    variable_names: space5-1_htg_setpoint
    keys: SPACE5-1
  Zone Thermostat Cooling Setpoint Temperature Zone5:
    variable_names: space5-1_clg_setpoint
    keys: SPACE5-1

  # ---------------------------------- ENERGY ---------------------------------- #
  Environmental Impact Total CO2 Emissions Carbon Equivalent Mass:
    variable_names: co2_emission
    keys: site
  Facility Total HVAC Electricity Demand Rate:
    variable_names: HVAC_electricity_demand_rate
    keys: Whole Building

# ------------------------------- OUTPUT:METERS ------------------------------ #
meters:
  Electricity:HVAC: total_electricity_HVAC

# ---------------------------------------------------------------------------- #
#                               ACTION VARIABLES                               #
# ---------------------------------------------------------------------------- #

# --------------------------- ACTUATORS TO CONTROL --------------------------- #
actuators:
  # Zone 1 Setpoints
  SPACE1-1-Htg-SetP-Sch:
    variable_name: Heating_Setpoint_RL_Zone1
    element_type: Schedule:Compact
    value_type: Schedule Value
  SPACE1-1-Clg-SetP-Sch:
    variable_name: Cooling_Setpoint_RL_Zone1
    element_type: Schedule:Compact
    value_type: Schedule Value

  # Zone 2 Setpoints
  SPACE2-1-Htg-SetP-Sch:
    variable_name: Heating_Setpoint_RL_Zone2
    element_type: Schedule:Compact
    value_type: Schedule Value
  SPACE2-1-Clg-SetP-Sch:
    variable_name: Cooling_Setpoint_RL_Zone2
    element_type: Schedule:Compact
    value_type: Schedule Value

  # Zone 3 Setpoints
  SPACE3-1-Htg-SetP-Sch:
    variable_name: Heating_Setpoint_RL_Zone3
    element_type: Schedule:Compact
    value_type: Schedule Value
  SPACE3-1-Clg-SetP-Sch:
    variable_name: Cooling_Setpoint_RL_Zone3
    element_type: Schedule:Compact
    value_type: Schedule Value

  # Zone 4 Setpoints
  SPACE4-1-Htg-SetP-Sch:
    variable_name: Heating_Setpoint_RL_Zone4
    element_type: Schedule:Compact
    value_type: Schedule Value
  SPACE4-1-Clg-SetP-Sch:
    variable_name: Cooling_Setpoint_RL_Zone4
    element_type: Schedule:Compact
    value_type: Schedule Value

  # Zone 5 Setpoints
  SPACE5-1-Htg-SetP-Sch:
    variable_name: Heating_Setpoint_RL_Zone5
    element_type: Schedule:Compact
    value_type: Schedule Value
  SPACE5-1-Clg-SetP-Sch:
    variable_name: Cooling_Setpoint_RL_Zone5
    element_type: Schedule:Compact
    value_type: Schedule Value

# ---------------------------------------------------------------------------- #
#                   DYNAMIC CONTEXT CONFIGURABLE IN REAL-TIME                  #
# ---------------------------------------------------------------------------- #
context: {}

# ---------------------------------------------------------------------------- #
#                                 ACTIONS SPACE                                #
# ---------------------------------------------------------------------------- #
# 10-dimensional action space: [htg_zone1, clg_zone1, htg_zone2, clg_zone2, 
#                               htg_zone3, clg_zone3, htg_zone4, clg_zone4, 
#                               htg_zone5, clg_zone5]
action_space: "gym.spaces.Box(low=np.array([12.0, 23.25, 12.0, 23.25, 12.0, 23.25, 12.0, 23.25, 12.0, 23.25], dtype=np.float32), high=np.array([23.25, 30.0, 23.25, 30.0, 23.25, 30.0, 23.25, 30.0, 23.25, 30.0], dtype=np.float32), shape=(10,), dtype=np.float32)"

action_space_discrete: "gym.spaces.Discrete(100)"  # 10^2 = 100 combinations

# ---------------------------------------------------------------------------- #
#                                REWARD FUNCTION                               #
# ---------------------------------------------------------------------------- #
reward: sinergym.utils.rewards:LinearReward

reward_kwargs:
  temperature_variables:
    - space1-1_air_temperature
    - space2-1_air_temperature
    - space3-1_air_temperature
    - space4-1_air_temperature
    - space5-1_air_temperature
  energy_variables:
    - HVAC_electricity_demand_rate
  range_comfort_winter:
    - 20.0
    - 23.5
  range_comfort_summer:
    - 23.0
    - 26.0
  summer_start:
    - 6
    - 1
  summer_final:
    - 9
    - 30
  energy_weight: 0.5
  lambda_energy: 1.0e-4
  lambda_temperature: 1.0