# Documentation: https://ugr-sail.github.io/sinergym/compilation/main/pages/environments_registration.html
# ---------------------------------------------------------------------------- #
#                        ID BASE FROM ENVIRONMNET NAMES                        #
# ---------------------------------------------------------------------------- #
id_base: 5zone

# ---------------------------------------------------------------------------- #
#                         BUILDING AND WEATHER SETTINGS                        #
# ---------------------------------------------------------------------------- #
building_file: 5ZoneAutoDXVAV.epJSON

# A environment alternative for each weather key
weather_specification:
  weather_files:
    - USA_AZ_Davis-Monthan.AFB.722745_TMY3.epw
    - USA_NY_New.York-J.F.Kennedy.Intl.AP.744860_TMY3.epw
    - USA_WA_Port.Angeles-William.R.Fairchild.Intl.AP.727885_TMY3.epw
  keys:
    - hot
    - mixed
    - cool

# ---------------------------------------------------------------------------- #
#                         BUILDING EXTRA CONFIGURATION                         #
# ---------------------------------------------------------------------------- #
building_config: null


# ---------------------------------------------------------------------------- #
#                        WEATHER VARIABILITY (OPTIONAL)                        #
# ---------------------------------------------------------------------------- #
# Alternative stochastic environments if it is defined
weather_variability:
  Dry Bulb Temperature:
    - 1.0 # sigma
    - 0.0 # mu
    - 24.0 # tau
  Relative Humidity:
    - [2.0, 5.0]
    - 0.0
    - 24.0
    - [0, 100] # var_range
# ---------------------------------------------------------------------------- #
#                          EPISODES FOLDER GENERATION                          #
# ---------------------------------------------------------------------------- #
max_ep_store: 3

# ---------------------------------------------------------------------------- #
#                             OBSERVATION VARIABLES                            #
# ---------------------------------------------------------------------------- #

# --------------- TIME VARIABLES (same name as EnergyPlus API) --------------- #
time_variables:
  - month
  - day_of_month
  - hour
# More variables in Data Transfer API: https://energyplus.readthedocs.io/en/latest/datatransfer.html

# ----------------------------- OUTPUT:VARIABLES ----------------------------- #
variables:

  # ---------------------------------- OUTDOOR --------------------------------- #
  Site Outdoor Air DryBulb Temperature:
    variable_names: outdoor_temperature
    keys: Environment
  Site Outdoor Air Relative Humidity:
    variable_names: outdoor_humidity
    keys: Environment
  Site Wind Speed:
    variable_names: wind_speed
    keys: Environment
  Site Wind Direction:
    variable_names: wind_direction
    keys: Environment
  Site Diffuse Solar Radiation Rate per Area:
    variable_names: diffuse_solar_radiation
    keys: Environment
  Site Direct Solar Radiation Rate per Area:
    variable_names: direct_solar_radiation
    keys: Environment

  # -------------------------------- ZONE INDOOR ------------------------------- #
  Zone Air Temperature:
    variable_names: air_temperature
    keys: SPACE5-1
  Zone Air Relative Humidity:
    variable_names: air_humidity
    keys: SPACE5-1
  Zone People Occupant Count:
    variable_names: people_occupant
    keys: SPACE5-1

  # ---------------------------------- SYSTEM ---------------------------------- #
  Zone Thermostat Heating Setpoint Temperature:
    variable_names: htg_setpoint
    keys: SPACE5-1
  Zone Thermostat Cooling Setpoint Temperature:
    variable_names: clg_setpoint
    keys: SPACE5-1

  # ---------------------------------- ENERGY ---------------------------------- #
  Environmental Impact Total CO2 Emissions Carbon Equivalent Mass:
    variable_names: co2_emission
    keys: site
  Facility Total HVAC Electricity Demand Rate:
    variable_names: HVAC_electricity_demand_rate
    keys: Whole Building

  # -------------------------------- HVAC COMPONENTS ------------------------------- #
  # Supply Fan
  Fan Electricity Rate:
    variable_names: fan_electricity_rate
    keys: Supply Fan 1
  Fan Air Mass Flow Rate:
    variable_names: fan_air_mass_flow_rate
    keys: Supply Fan 1
  Fan Rise in Air Temperature:
    variable_names: fan_rise_air_temp
    keys: Supply Fan 1
  Fan Heat Gain to Air:
    variable_names: fan_heat_gain
    keys: Supply Fan 1

  # Main Cooling Coil
  Cooling Coil Total Cooling Rate:
    variable_names: cooling_coil_total_rate
    keys: Main Cooling Coil 1
  Cooling Coil Sensible Cooling Rate:
    variable_names: cooling_coil_sensible_rate
    keys: Main Cooling Coil 1
  Cooling Coil Latent Cooling Rate:
    variable_names: cooling_coil_latent_rate
    keys: Main Cooling Coil 1
  Cooling Coil Electricity Rate:
    variable_names: cooling_coil_electricity_rate
    keys: Main Cooling Coil 1
  Cooling Coil Runtime Fraction:
    variable_names: cooling_coil_runtime_fraction
    keys: Main Cooling Coil 1
  Cooling Coil Basin Heater Electricity Rate:
    variable_names: cooling_coil_basin_heater_rate
    keys: Main Cooling Coil 1

  # Main Heating Coil
  Heating Coil Heating Rate:
    variable_names: heating_coil_heating_rate
    keys: Main heating Coil 1
  Heating Coil Electricity Rate:
    variable_names: heating_coil_electricity_rate
    keys: Main heating Coil 1

  # VAV Terminal Status (Zone 1)
  Zone Air Terminal VAV Damper Position:
    variable_names: vav_damper_position_1
    keys: SPACE1-1 VAV Reheat
  Zone Air Terminal Sensible Heating Rate:
    variable_names: vav_heating_rate_1
    keys: SPACE1-1 VAV Reheat
  Zone Air Terminal Sensible Cooling Rate:
    variable_names: vav_cooling_rate_1
    keys: SPACE1-1 VAV Reheat

  # VAV Terminal Status (Zone 2)
  Zone Air Terminal VAV Damper Position 2:
    variable_names: vav_damper_position_2
    keys: SPACE2-1 VAV Reheat
  Zone Air Terminal Sensible Heating Rate 2:
    variable_names: vav_heating_rate_2
    keys: SPACE2-1 VAV Reheat
  Zone Air Terminal Sensible Cooling Rate 2:
    variable_names: vav_cooling_rate_2
    keys: SPACE2-1 VAV Reheat

  # VAV Terminal Status (Zone 3)
  Zone Air Terminal VAV Damper Position 3:
    variable_names: vav_damper_position_3
    keys: SPACE3-1 VAV Reheat
  Zone Air Terminal Sensible Heating Rate 3:
    variable_names: vav_heating_rate_3
    keys: SPACE3-1 VAV Reheat
  Zone Air Terminal Sensible Cooling Rate 3:
    variable_names: vav_cooling_rate_3
    keys: SPACE3-1 VAV Reheat

  # VAV Terminal Status (Zone 4)
  Zone Air Terminal VAV Damper Position 4:
    variable_names: vav_damper_position_4
    keys: SPACE4-1 VAV Reheat
  Zone Air Terminal Sensible Heating Rate 4:
    variable_names: vav_heating_rate_4
    keys: SPACE4-1 VAV Reheat
  Zone Air Terminal Sensible Cooling Rate 4:
    variable_names: vav_cooling_rate_4
    keys: SPACE4-1 VAV Reheat

  # VAV Terminal Status (Zone 5)
  Zone Air Terminal VAV Damper Position 5:
    variable_names: vav_damper_position_5
    keys: SPACE5-1 VAV Reheat
  Zone Air Terminal Sensible Heating Rate 5:
    variable_names: vav_heating_rate_5
    keys: SPACE5-1 VAV Reheat
  Zone Air Terminal Sensible Cooling Rate 5:
    variable_names: vav_cooling_rate_5
    keys: SPACE5-1 VAV Reheat

  # Air System Status
  Air System Outdoor Air Economizer Status:
    variable_names: outdoor_air_economizer_status
    keys: VAV Sys 1
  Air System Outdoor Air Flow Fraction:
    variable_names: outdoor_air_flow_fraction
    keys: VAV Sys 1
  Air System Outdoor Air Mass Flow Rate:
    variable_names: outdoor_air_mass_flow_rate
    keys: VAV Sys 1
  Air System Mixed Air Mass Flow Rate:
    variable_names: mixed_air_mass_flow_rate
    keys: VAV Sys 1

  # System Node Temperatures
  System Node Temperature:
    variable_names: supply_air_temp
    keys: VAV Sys 1 Outlet Node
  System Node Mass Flow Rate:
    variable_names: supply_air_mass_flow_rate
    keys: VAV Sys 1 Outlet Node
  System Node Temperature Mixed:
    variable_names: mixed_air_temp
    keys: Mixed Air Node 1
  System Node Temperature Cooling:
    variable_names: cooling_coil_outlet_temp
    keys: Main Cooling Coil 1 Outlet Node
  System Node Temperature Heating:
    variable_names: heating_coil_outlet_temp
    keys: Main Heating Coil 1 Outlet Node

# ------------------------------- OUTPUT:METERS ------------------------------ #
meters:
  Electricity:HVAC: total_electricity_HVAC
  Fan Electricity Energy: fan_electricity_energy
  Cooling Coil Total Cooling Energy: cooling_coil_total_energy
  Cooling Coil Sensible Cooling Energy: cooling_coil_sensible_energy
  Cooling Coil Latent Cooling Energy: cooling_coil_latent_energy
  Cooling Coil Electricity Energy: cooling_coil_electricity_energy
  Cooling Coil Basin Heater Electricity Energy: cooling_coil_basin_heater_energy
  Heating Coil Heating Energy: heating_coil_heating_energy
  Heating Coil Electricity Energy: heating_coil_electricity_energy
  Zone Air Terminal Sensible Heating Energy: vav_heating_energy_1
  Zone Air Terminal Sensible Cooling Energy: vav_cooling_energy_1
  Zone Air Terminal Sensible Heating Energy 2: vav_heating_energy_2
  Zone Air Terminal Sensible Cooling Energy 2: vav_cooling_energy_2
  Zone Air Terminal Sensible Heating Energy 3: vav_heating_energy_3
  Zone Air Terminal Sensible Cooling Energy 3: vav_cooling_energy_3
  Zone Air Terminal Sensible Heating Energy 4: vav_heating_energy_4
  Zone Air Terminal Sensible Cooling Energy 4: vav_cooling_energy_4
  Zone Air Terminal Sensible Heating Energy 5: vav_heating_energy_5
  Zone Air Terminal Sensible Cooling Energy 5: vav_cooling_energy_5

# ---------------------------------------------------------------------------- #
#                               ACTION VARIABLES                               #
# ---------------------------------------------------------------------------- #

# --------------------------- ACTUATORS TO CONTROL --------------------------- #
actuators:
  HTG-SETP-SCH:
    variable_name: Heating_Setpoint_RL
    element_type: Schedule:Compact
    value_type: Schedule Value
  CLG-SETP-SCH:
    variable_name: Cooling_Setpoint_RL
    element_type: Schedule:Compact
    value_type: Schedule Value

# ---------------------------------------------------------------------------- #
#                   DYNAMIC CONTEXT CONFIGURABLE IN REAL-TIME                  #
# ---------------------------------------------------------------------------- #
context: {}

# ---------------------------------------------------------------------------- #
#                                 ACTIONS SPACE                                #
# ---------------------------------------------------------------------------- #
action_space: gym.spaces.Box(low=np.array([12.0, 23.25], dtype=np.float32), high=np.array([23.25, 30.0], dtype=np.float32), shape=(2,), dtype=np.float32)

action_space_discrete: gym.spaces.Discrete(10)

# ---------------------------------------------------------------------------- #
#                                REWARD FUNCTION                               #
# ---------------------------------------------------------------------------- #
reward: sinergym.utils.rewards:LinearReward

reward_kwargs:
  temperature_variables:
    - air_temperature
  energy_variables:
    - HVAC_electricity_demand_rate
  range_comfort_winter:
    - 20.0
    - 23.5
  range_comfort_summer:
    - 23.0
    - 26.0
  summer_start:
    - 6
    - 1
  summer_final:
    - 9
    - 30
  energy_weight: 0.5
  lambda_energy: 1.0e-4
  lambda_temperature: 1.0
